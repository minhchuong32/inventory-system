<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/base :: layout(~{::title/text()}, ~{::main}, 'imports')}"
>
  <head>
    <title>Tạo phiếu nhập kho</title>
  </head>

  <body>
    <main>
      <div class="card">
        <div class="card-header">
          <h6 class="card-title">
            <i class="bi bi-download"></i> Tạo phiếu nhập kho mới
          </h6>
          <a th:href="@{/imports}" class="btn-sm-action btn-view">
            <i class="bi bi-arrow-left"></i> Quay lại
          </a>
        </div>

        <div class="card-body">
          <form action="/imports/save" method="post" id="importForm">
            <!-- HEADER -->
            <div class="row g-4 mb-3">
              <div class="col-md-4">
                <div class="form-section">
                  <div class="form-section-title">
                    <i class="bi bi-truck"></i> Nhà cung cấp *
                  </div>
                  <select name="supplierId" class="form-select" required>
                    <option value="">-- Chọn nhà cung cấp --</option>
                    <option
                      th:each="s:${suppliers}"
                      th:value="${s.id}"
                      th:text="${s.name+' ('+s.code+')'}"
                    ></option>
                  </select>
                </div>
              </div>

              <div class="col-md-4">
                <div class="form-section">
                  <div class="form-section-title">
                    <i class="bi bi-receipt"></i> Số hóa đơn
                  </div>
                  <input
                    type="text"
                    name="invoiceNumber"
                    class="form-control"
                    placeholder="INV-2025-001"
                  />
                </div>
              </div>

              <div class="col-md-4">
                <div class="form-section">
                  <div class="form-section-title">
                    <i class="bi bi-card-text"></i> Ghi chú
                  </div>
                  <textarea
                    name="note"
                    class="form-control"
                    rows="3"
                    placeholder="Ghi chú..."
                  ></textarea>
                </div>
              </div>
            </div>

            <!-- TABLE -->
            <div class="form-section">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <div class="form-section-title mb-0">
                  <i class="bi bi-list-ul"></i> Danh sách hàng nhập
                </div>
                <button
                  type="button"
                  class="btn-primary-custom"
                  onclick="addRow()"
                >
                  <i class="bi bi-plus-lg"></i> Thêm dòng
                </button>
              </div>

              <div class="table-wrapper">
                <table class="inv-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Sản phẩm *</th>
                      <th>Đơn vị</th>
                      <th>Số lượng *</th>
                      <th>Đơn giá *</th>
                      <th>Thành tiền</th>
                      <th></th>
                    </tr>
                  </thead>

                  <tbody id="detailBody"></tbody>

                  <tfoot>
                    <tr style="background: #f8f9ff">
                      <td
                        colspan="5"
                        style="
                          text-align: right;
                          font-weight: 700;
                          padding: 12px;
                        "
                      >
                        TỔNG CỘNG:
                      </td>
                      <td
                        id="grandTotal"
                        style="
                          font-weight: 700;
                          color: var(--primary);
                          font-size: 16px;
                        "
                      >
                        0 ₫
                      </td>
                      <td></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>

            <!-- ACTION -->
            <div class="d-flex gap-3 justify-content-end mt-3">
              <a th:href="@{/imports}" class="btn btn-light">Hủy</a>
              <button type="submit" class="btn-primary-custom">
                <i class="bi bi-save"></i> Lưu phiếu nhập
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- DATA LIST -->
      <datalist id="productList">
        <option
          th:each="p : ${products}"
          th:value="${p.id}"
          th:label="${p.name}"
          th:data-unit="${p.unitName}"
          th:data-price="${p.costPrice}"
        ></option>
      </datalist>

      <script>
        let rowCount = 0;

        function getProductOptions() {
          let opts = '<option value="">-- Chọn sản phẩm --</option>';
          document.querySelectorAll("#productList option").forEach((opt) => {
            const id = opt.value;
            const name = opt.getAttribute("label");
            opts += `<option value="${id}">${name}</option>`;
          });
          return opts;
        }

        function getProductById(id) {
          const opt = document.querySelector(
            `#productList option[value="${id}"]`,
          );
          if (!opt) return null;
          return {
            unit: opt.getAttribute("data-unit") || "—",
            price: parseFloat(opt.getAttribute("data-price") || 0),
          };
        }

        function addRow() {
          rowCount++;
          const tr = document.createElement("tr");
          tr.id = "row-" + rowCount;

          tr.innerHTML = `
        <td>${rowCount}</td>
        <td>
            <select name="productIds" class="form-select" required
                    onchange="onSelect(this, ${rowCount})">
                ${getProductOptions()}
            </select>
        </td>
        <td><span id="unit-${rowCount}">—</span></td>
        <td><input type="number" name="quantities" id="qty-${rowCount}"
                   class="form-control" min="1" value="1"
                   oninput="calcRow(${rowCount})"></td>
        <td><input type="number" name="unitPrices" id="price-${rowCount}"
                   class="form-control" min="0" value="0"
                   oninput="calcRow(${rowCount})"></td>
        <td><span id="total-${rowCount}">0 ₫</span></td>
        <td>
            <button type="button" onclick="removeRow(${rowCount})">
                🗑
            </button>
        </td>
    `;

          document.getElementById("detailBody").appendChild(tr);
        }

        function onSelect(sel, rowId) {
          const p = getProductById(sel.value);
          if (p) {
            document.getElementById("unit-" + rowId).textContent = p.unit;
            document.getElementById("price-" + rowId).value = p.price;
            calcRow(rowId);
          }
        }

        function calcRow(rowId) {
          const qty = parseFloat(
            document.getElementById("qty-" + rowId)?.value || 0,
          );
          const price = parseFloat(
            document.getElementById("price-" + rowId)?.value || 0,
          );
          const total = qty * price;

          document.getElementById("total-" + rowId).textContent =
            total.toLocaleString("vi-VN") + " ₫";

          calcGrand();
        }

        function calcGrand() {
          let grand = 0;
          document.querySelectorAll('[id^="total-"]').forEach((el) => {
            grand += parseFloat(el.textContent.replace(/[^\d]/g, "")) || 0;
          });
          document.getElementById("grandTotal").textContent =
            grand.toLocaleString("vi-VN") + " ₫";
        }

        function removeRow(id) {
          document.getElementById("row-" + id)?.remove();
          calcGrand();
        }

        document
          .getElementById("importForm")
          .addEventListener("submit", function (e) {
            if (!document.querySelectorAll("#detailBody tr").length) {
              e.preventDefault();
              alert("Vui lòng thêm ít nhất 1 sản phẩm!");
            }
          });

        addRow();
      </script>
    </main>
  </body>
</html>
