<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | Inventory System</title>

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <style>
        :root {
            --primary: #1a237e;
            --primary-light: #3949ab;
            --accent: #00acc1;
            --error-bg: #ffebee;
            --error-text: #c62828;
        }

        body {
            background: linear-gradient(135deg, #0d1257 0%, #1a237e 50%, #283593 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 440px;
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            padding: 36px;
            text-align: center;
            color: white;
        }

        .logo-circle {
            width: 72px;
            height: 72px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 12px;
        }

        .login-body {
            padding: 36px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        /* Input with Icons */
        .input-icon-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 16px;
            z-index: 5;
        }

        .input-icon-group .form-control {
            padding: 11px 16px 11px 42px;
            border: 1.5px solid #e8eaf6;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .input-icon-group .form-control:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(57, 73, 171, 0.1);
            outline: none;
        }

        /* Error Message Style */
        #error-msg {
            display: none;
            background: var(--error-bg);
            color: var(--error-text);
            border-left: 4px solid var(--error-text);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        /* Buttons */
        .btn-login {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 35, 126, 0.4);
            color: white;
        }

        .btn-login:disabled {
            opacity: 0.8;
            transform: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: #aaa;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #eee;
        }

        .divider:not(:empty)::before { margin-right: 1em; }
        .divider:not(:empty)::after { margin-left: 1em; }

        #google-btn-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <div class="logo-circle">
            <i class="bi bi-boxes"></i>
        </div>
        <h4 class="mb-1 fw-bold">Hệ Thống Kho UTE</h4>
        <p class="mb-0 opacity-75" style="font-size: 13px">
            Inventory Management System
        </p>
    </div>

    <div class="login-body">
        <div id="error-msg">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span id="error-text-content"></span>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-icon-group">
                    <i class="bi bi-person"></i>
                    <input type="text" id="username" class="form-control" placeholder="Nhập username" required autofocus />
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <div class="input-icon-group">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required />
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <span id="btnText">Đăng nhập</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
            </button>
        </form>

        <div class="divider">Hoặc tiếp tục với</div>

        <div id="google-btn-container">
            <div id="g_id_signin"></div>
        </div>

        <p class="footer-text">
            IMS v1.0 &copy; 2026 UTE Development Team 18
        </p>
    </div>
</div>

<script th:inline="javascript">
    // Configuration
    const GOOGLE_CLIENT_ID = "291635136813-5a7taqf5oqlufen5kc0ee5htb1199shs.apps.googleusercontent.com";
    const API_LOGIN_URL = "/api/auth/login";
    const DASHBOARD_URL = "/dashboard";

    const errorMsg = document.getElementById("error-msg");
    const errorTextContent = document.getElementById("error-text-content");
    const btnLogin = document.getElementById("btnLogin");
    const btnText = document.getElementById("btnText");
    const btnSpinner = document.getElementById("btnSpinner");

    // Initialize Google SDK
    window.onload = function () {
        google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleGoogleCallback,
            auto_select: false,
        });

        google.accounts.id.renderButton(
            document.getElementById("g_id_signin"),
            {
                theme: "outline",
                size: "large",
                width: "360", // Match card width better
                text: "signin_with",
                shape: "pill"
            }
        );
    };

    function handleGoogleCallback(response) {
        handleLogin({
            authType: "GOOGLE",
            googleAccessToken: response.credential
        });
    }

    document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        handleLogin({
            authType: "NORMAL",
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
        });
    });

    async function handleLogin(payload) {
        showError(null);
        setLoading(true);

        try {
            const response = await fetch(API_LOGIN_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem("user_info", JSON.stringify(data));
                window.location.href = DASHBOARD_URL;
            } else {
                const errData = await response.json();
                showError(errData.message || "Tên đăng nhập hoặc mật khẩu không chính xác.");
            }
        } catch (error) {
            console.error("Login Error:", error);
            showError("Không thể kết nối đến máy chủ. Vui lòng thử lại.");
        } finally {
            setLoading(false);
        }
    }

    function setLoading(isLoading) {
        btnLogin.disabled = isLoading;
        if (isLoading) {
            btnText.innerText = "Đang xử lý...";
            btnSpinner.classList.remove("d-none");
        } else {
            btnText.innerText = "Đăng nhập";
            btnSpinner.classList.add("d-none");
        }
    }

    function showError(message) {
        if (message) {
            errorTextContent.innerText = message;
            errorMsg.style.display = "block";
        } else {
            errorMsg.style.display = "none";
        }
    }
</script>
</body>
</html>
