<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/base :: layout(~{::title/text()}, ~{::main}, 'customers')}"
>
  <head>
    <title th:text="${customer.id==null}?'Thêm khách hàng':'Sửa khách hàng'">
      Form khách hàng
    </title>
  </head>
  <body>
    <main>
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header">
              <h6 class="card-title">
                <i class="bi bi-people"></i>
                <span
                  th:text="${customer.id==null}?'Thêm khách hàng':'Cập nhật khách hàng'"
                ></span>
              </h6>
              <a th:href="@{/customers}" class="btn-sm-action btn-view"
                ><i class="bi bi-arrow-left"></i> Quay lại</a
              >
            </div>
            <div class="card-body">
              <form
                th:action="@{/customers/save}"
                method="post"
                th:object="${customer}"
              >
                <input type="hidden" th:field="*{id}" />
                <div class="form-section">
                  <div class="form-section-title">
                    <i class="bi bi-info-circle"></i> Thông tin cơ bản
                  </div>
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">Tên khách hàng *</label>
                      <input
                        type="text"
                        th:field="*{name}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('name')}?'is-invalid'"
                        placeholder="Nguyễn Văn A"
                      />
                      <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Mã khách hàng</label>
                      <input
                        type="text"
                        th:field="*{code}"
                        class="form-control"
                        placeholder="KH0001"
                      />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Điện thoại *</label>
                      <input
                        type="text"
                        th:field="*{phone}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('phone')}?'is-invalid'"
                        placeholder="0901234567"
                      />
                      <div class="invalid-feedback" th:errors="*{phone}"></div>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Email</label>
                      <input
                        type="email"
                        th:field="*{email}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('email')}?'is-invalid'"
                        placeholder="khachhang@example.com"
                      />
                      <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="col-12">
                      <label class="form-label">Địa chỉ</label>
                      <input
                        type="text"
                        th:field="*{address}"
                        class="form-control"
                        placeholder="Nhập địa chỉ khách hàng"
                      />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Loại khách hàng</label>
                      <select th:field="*{customerType}" class="form-select">
                        <option value="RETAIL">Khách lẻ</option>
                        <option value="WHOLESALE">Khách sỉ</option>
                        <option value="VIP">Khách VIP</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Trạng thái</label>
                      <select th:field="*{status}" class="form-select">
                        <option value="true">Hoạt động</option>
                        <option value="false">Ngừng hoạt động</option>
                      </select>
                    </div>
                  </div>
                </div>
                <div class="form-section">
                  <div class="form-section-title">
                    <i class="bi bi-receipt"></i> Thông tin tài chính
                  </div>
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">Tổng mua hàng (₫)</label>
                      <input
                        type="number"
                        th:field="*{totalPurchase}"
                        class="form-control"
                        min="0"
                        step="1000"
                        value="0"
                        readonly
                      />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Mã số thuế</label>
                      <input
                        type="text"
                        th:field="*{taxCode}"
                        class="form-control"
                        placeholder="0300000000"
                      />
                    </div>
                  </div>
                </div>
                <div class="d-flex gap-3 justify-content-end">
                  <a th:href="@{/customers}" class="btn btn-light">Hủy</a>
                  <button type="submit" class="btn-primary-custom">
                    <i class="bi bi-save"></i> Lưu khách hàng
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
