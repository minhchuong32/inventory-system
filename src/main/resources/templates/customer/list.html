<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/base :: layout(~{::title/text()}, ~{::main}, 'customers')}"
>
  <head>
    <title>Khách hàng</title>
  </head>
  <body>
    <main>
      <!-- STATS SECTION -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">
            <i class="bi bi-people"></i>
          </div>
          <div class="stat-info">
            <div class="stat-value" th:text="${stats.totalCustomers}">1,284</div>
            <div class="stat-label">Tổng khách hàng</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon cyan">
            <i class="bi bi-person-plus"></i>
          </div>
          <div class="stat-info">
            <div class="stat-value" th:text="${stats.newCustomers}">48</div>
            <div class="stat-label">Khách hàng mới</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">
            <i class="bi bi-cash-coin"></i>
          </div>
          <div class="stat-info">
            <div class="stat-value" th:text="${#numbers.formatDecimal(stats.monthlyRevenue,0,'COMMA',0,'POINT')} + ' ₫'">2.4M</div>
            <div class="stat-label">Doanh thu tháng</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">
            <i class="bi bi-percent"></i>
          </div>
          <div class="stat-info">
            <div class="stat-value" th:text="${stats.returnRate} + '%'">64%</div>
            <div class="stat-label">Tỷ lệ quay lại</div>
          </div>
        </div>
      </div>

      <!-- FILTER & SEARCH SECTION -->
      <div class="card">
        <div class="card-body" style="display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #f0f0f0;">
          <div style="display: flex; gap: 12px; align-items: center;">
            <form th:action="@{/customers}" method="get" style="display: flex; align-items: center; gap: 6px; margin: 0;">
              <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Tìm kiếm khách hàng..." style="width: 220px; font-size: 13px; border-radius: 6px;" />
              <button type="submit" class="btn-sm-action" style="background: #e3f2fd; color: #1565c0; padding: 6px 12px; border: none;">
                <i class="bi bi-search"></i> Tìm
              </button>
            </form>
            <div style="display: flex; align-items: center; gap: 6px;">
              <label style="font-size: 13px; font-weight: 500; color: #555; margin: 0;">Loại KH:</label>
              <select class="form-select" style="width: 140px; font-size: 13px;">
                <option value="">Tất cả</option>
                <option value="RETAIL">Lẻ</option>
                <option value="WHOLESALE">Sỉ</option>
                <option value="VIP">VIP</option>
              </select>
            </div>
            <div style="display: flex; align-items: center; gap: 6px;">
              <label style="font-size: 13px; font-weight: 500; color: #555; margin: 0;">Hạng:</label>
              <select class="form-select" style="width: 140px; font-size: 13px;">
                <option value="">Tất cả</option>
                <option value="BRONZE">Đồng</option>
                <option value="SILVER">Bạc</option>
                <option value="GOLD">Vàng</option>
              </select>
            </div>
          </div>
          <div style="display: flex; gap: 12px; align-items: center;">
            <a href="#" class="btn-sm-action" style="background: #e3f2fd; color: #1565c0; padding: 6px 12px;">
              <i class="bi bi-funnel"></i> Bộ lọc nâng cao
            </a>
            <a th:href="@{/customers/new}" class="btn-primary-custom" style="padding: 6px 16px; display: inline-flex; align-items: center; gap: 6px;">
              <i class="bi bi-plus-lg"></i> Thêm mới
            </a>
          </div>
        </div>

        <!-- TABLE SECTION -->
        <div class="table-wrapper">
        <div class="table-wrapper">
          <table class="inv-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Tên khách hàng</th>
                <th>Địa chỉ</th>
                <th>Điện thoại</th>
                <th>Email</th>
                <th>Loại KH</th>
                <th>Tổng mua hàng</th>
                <th>Trạng thái</th>
                <th class="actions">Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${customers.empty}">
                <td
                  colspan="9"
                  style="text-align: center; padding: 40px; color: #aaa"
                >
                  <i
                    class="bi bi-inbox"
                    style="font-size: 32px; display: block"
                  ></i
                  >Không có khách hàng nào
                </td>
              </tr>
              <tr th:each="c,stat : ${customers.content}">
                <td
                  th:text="${customers.number*customers.size+stat.index+1}"
                  style="color: #aaa; font-size: 12px"
                ></td>
                <td>
                  <div style="font-weight: 600" th:text="${c.name}"></div>
                  <div
                    th:if="${c.code}"
                    style="font-size: 11px; color: #aaa"
                    th:text="'Mã: '+${c.code}"
                  ></div>
                </td>
                <td th:text="${c.address ?: '—'}"></td>
                <td th:text="${c.phone ?: '—'}"></td>
                <td>
                  <span
                    style="font-size: 11px; color: #666"
                    th:text="${c.email ?: '—'}"
                  ></span>
                </td>
                <td>
                  <span
                    th:if="${c.customerType}"
                    class="badge"
                    th:classappend="${c.customerType=='RETAIL'}?'bg-info':'bg-primary'"
                    th:text="${c.customerType=='RETAIL'?'Lẻ':c.customerType=='WHOLESALE'?'Sỉ':'VIP'}"
                  ></span>
                </td>
                <td>
                  <span
                    style="color: #2e7d32"
                    th:text="${#numbers.formatDecimal(c.totalPurchase,0,'COMMA',0,'POINT')+' ₫'}"
                    >0 ₫</span
                  >
                </td>
                <td>
                  <span th:if="${c.status}" class="badge-status badge-active"
                    >Hoạt động</span
                  >
                  <span
                    th:unless="${c.status}"
                    class="badge-status badge-inactive"
                    >Ngừng</span
                  >
                </td>
                <td class="actions">
                  <a
                    th:href="@{/customers/{id}/edit(id=${c.id})}"
                    class="btn-sm-action btn-edit"
                    ><i class="bi bi-pencil"></i
                  ></a>
                  <form
                    th:action="@{/customers/{id}/delete(id=${c.id})}"
                    method="post"
                    style="display: inline"
                    onsubmit="return confirm('Xóa khách hàng này?');"
                  >
                    <button type="submit" class="btn-sm-action btn-delete">
                      <i class="bi bi-trash"></i>
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="pagination-wrapper">
          <div style="font-size: 13px; color: #888">
            <strong th:text="${customers.numberOfElements}"></strong> /
            <strong th:text="${customers.totalElements}"></strong> khách hàng
          </div>
          <nav th:if="${customers.totalPages > 1}">
            <ul class="pagination mb-0">
              <li
                class="page-item"
                th:classappend="${customers.first}?'disabled'"
              >
                <a
                  class="page-link"
                  th:href="@{/customers(page=${customers.number-1},search=${search})}"
                  ><i class="bi bi-chevron-left"></i
                ></a>
              </li>
              <li
                class="page-item"
                th:each="i:${#numbers.sequence(0,customers.totalPages-1)}"
                th:classappend="${i==customers.number}?'active'"
              >
                <a
                  class="page-link"
                  th:href="@{/customers(page=${i},search=${search})}"
                  th:text="${i+1}"
                ></a>
              </li>
              <li
                class="page-item"
                th:classappend="${customers.last}?'disabled'"
              >
                <a
                  class="page-link"
                  th:href="@{/customers(page=${customers.number+1},search=${search})}"
                  ><i class="bi bi-chevron-right"></i
                ></a>
              </li>
            </ul>
          </nav>
        </div>
      </div>

      <!-- FOOTER ACTION BUTTON -->
      <div style="position: fixed; bottom: 30px; right: 30px">
        <a
          th:href="@{/customers/new}"
          class="btn-primary-custom"
          style="
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(26, 35, 126, 0.3);
            font-size: 24px;
          "
        >
          <i class="bi bi-plus"></i>
        </a>
      </div>
    </main>
  </body>
</html>
